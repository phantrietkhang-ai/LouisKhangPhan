<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Profile Card</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: url("https://images3.alphacoders.com/109/109937.jpg") no-repeat center center/cover;
      font-family: Arial, sans-serif;
    }

    .card {
      width: 350px;
      background: rgba(0, 0, 0, 0.7);
      border-radius: 20px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.6);
      overflow: hidden;
      text-align: center;
      color: white;
      padding: 20px;
      backdrop-filter: blur(10px);
    }

    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 3px solid #1DB954;
      object-fit: cover;
      margin: 10px auto;
      display: block;
    }

    h2 {
      margin: 10px 0 5px;
      font-size: 22px;
    }

    p {
      font-size: 14px;
      margin: 0 0 15px;
      opacity: 0.9;
    }

    /* Buttons container */
    .buttons {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 15px;
    }

    .buttons a, .buttons button {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: white;
      font-weight: bold;
      padding: 8px 15px;
      border-radius: 50px;
      font-size: 14px;
      transition: 0.3s;
    }

    /* Social buttons */
    .facebook { background-color: #1877F2; }
    .facebook:hover { background-color: #145dbf; }

    .github { background-color: #333; }
    .github:hover { background-color: #555; }

    /* Tim button */
    .tim-button {
      background: linear-gradient(45deg, #FF6B6B, #FF4757);
      border: none;
      cursor: pointer;
      font-size: 14px;
    }

    .tim-button:hover { filter: brightness(1.2); }

    .buttons img {
      width: 20px;
      height: 20px;
    }

    iframe {
      border-radius: 12px;
      width: 100%;
      height: 152px;
      border: none;
      margin-top: 15px;
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- Avatar -->
    <img class="avatar" src="https://shapes.inc/api/public/avatar/kingvon-nbmo" alt="Avatar">

    <!-- Tên -->
    <h2>Louis Phan</h2>

    <!-- Tiểu sử -->
    <p>Phan Triết Khang Louis</p>

    <!-- Buttons -->
    <div class="buttons">
      <!-- Facebook -->
      <a href="https://www.facebook.com/khang.phan.145565?locale=vi_VN" target="_blank" class="facebook">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" alt="FB Icon"> Facebook
      </a>

      <!-- GitHub -->
      <a href="https://github.com/phantrietkhang-ai" target="_blank" class="github">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733553.png" alt="GitHub Icon"> GitHub
      </a>

      <!-- Tim -->
      <button class="tim-button" id="timButton">
        <img src="https://cdn-icons-png.flaticon.com/512/833/833472.png" alt="Heart Icon"> Tim <span id="timCount">0</span>
      </button>
    </div>

    <!-- Nhạc Spotify -->
    <iframe style="border-radius:12px" 
      src="https://open.spotify.com/embed/track/5uyNAX6MazVAjBjVeOsTvp?utm_source=generator" 
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
      loading="lazy">
    </iframe>
  </div>

  <script>
    const timButton = document.getElementById('timButton');
    const timDisplay = document.getElementById('timCount');

    // Chỉ click 1 lần cho mỗi người
    if(!sessionStorage.getItem('timClicked')) timDisplay.textContent = 0;

    timButton.addEventListener('click', () => {
      if(sessionStorage.getItem('timClicked')) return;
      let count = parseInt(timDisplay.textContent) || 0;
      count++;
      timDisplay.textContent = count;
      sessionStorage.setItem('timClicked', 'true');
    });
  </script>
</body>
</html>
